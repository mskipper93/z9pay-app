name: Build Android Binaries
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk nodejs npm
          # Ensure Capacitor CLI is available without global install issues
          npm install

      - name: Sync Capacitor
        run: |
          # Use npx to ensure we use the local version in your node_modules
          npx cap sync android

      - name: Build and Package
        run: |
          cd android
          # Explicitly fix permissions for the wrapper
          chmod +x gradlew
          # Build both APK and AAB
          ./gradlew assembleDebug bundleRelease

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Z9Pay-Binaries
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/release/app-release.aab